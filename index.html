<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Build Floor"/>
<title>Front Runner Build Floor</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0f0;color:#1a1a1a;}
input,select,textarea,button{font-family:inherit;}
.screen{display:none;}.screen.active{display:block;}
.wrap{padding:14px;max-width:680px;margin:0 auto;}
.card{background:#fff;border:0.5px solid #e0e0e0;border-radius:10px;padding:16px 20px;margin-bottom:10px;}
.card-dark{background:#1a1a1a;color:#fff;border-radius:10px;padding:16px 20px;margin-bottom:10px;}
.btn{padding:12px 18px;border-radius:7px;border:0.5px solid #d0d0d0;background:transparent;color:#666;cursor:pointer;font-size:14px;white-space:nowrap;display:inline-block;}
.btn:active{opacity:0.7;}
.btn-blue{background:#E6F1FB;color:#0C447C;border-color:#185FA5;font-weight:500;}
.btn-green{background:#E1F5EE;color:#085041;border-color:#1D9E75;font-weight:500;}
.btn-red{background:#FCEBEB;color:#791F1F;border-color:#E24B4A;font-weight:500;}
.btn-amber{background:#FAEEDA;color:#633806;border-color:#854F0B;font-weight:500;}
.btn-purple{background:#EEEDFE;color:#3C3489;border-color:#533AB7;font-weight:500;}
.btn-full{width:100%;padding:14px;font-size:15px;text-align:center;display:block;}
.btn-sm{padding:8px 12px;font-size:13px;}
.inp{width:100%;padding:12px 14px;border:0.5px solid #d0d0d0;border-radius:7px;font-size:15px;outline:none;background:#fff;color:#1a1a1a;}
.sel{width:100%;padding:12px 14px;border:0.5px solid #d0d0d0;border-radius:7px;font-size:15px;background:#fff;color:#1a1a1a;}
.badge{display:inline-block;padding:3px 10px;border-radius:7px;font-size:12px;font-weight:500;}
.badge-blue{background:#E6F1FB;color:#0C447C;}
.badge-green{background:#EAF3DE;color:#27500A;}
.badge-amber{background:#FAEEDA;color:#633806;}
.badge-red{background:#FCEBEB;color:#791F1F;}
.badge-purple{background:#EEEDFE;color:#3C3489;}
.badge-gray{background:#f0f0f0;color:#444;}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.row-between{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.stat{background:#f9f9f9;border:0.5px solid #e0e0e0;border-radius:7px;padding:12px 14px;flex:1;min-width:80px;}
.task-row{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-bottom:0.5px solid #f0f0f0;cursor:pointer;}
.task-row:last-child{border-bottom:none;}
.task-done{background:#f7fdfb;}
.chk{width:26px;height:26px;border-radius:6px;border:2px solid #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;background:#fff;}
.chk-done{background:#1D9E75;border-color:#1D9E75;}
.note-box{padding:10px 14px;background:#FFF8E1;border-left:3px solid #EF9F27;border-radius:0 7px 7px 0;margin-bottom:6px;font-size:13px;color:#633806;}
.welding-color{padding:14px 16px;background:#FCEBEB;border:2px solid #E24B4A;border-radius:8px;margin-bottom:12px;}
.tab-bar{display:flex;gap:4px;overflow-x:auto;margin-bottom:12px;padding-bottom:4px;}
.tab{padding:8px 14px;border-radius:7px;border:0.5px solid #e0e0e0;background:transparent;color:#666;cursor:pointer;font-size:13px;white-space:nowrap;}
.tab.active{background:#E6F1FB;color:#0C447C;border-color:#185FA5;font-weight:500;}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;background:#e0e0e0;color:#666;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;border-bottom:0.5px solid #e0e0e0;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.progress-bar{height:8px;background:#f0f0f0;border-radius:4px;overflow:hidden;margin-top:8px;}
.progress-fill{height:100%;border-radius:4px;background:#185FA5;transition:width 0.3s;}
.hold-bar{background:#F3F0FE;border:0.5px solid #AFA9EC;border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:500;padding:16px;}
.modal{background:#fff;border-radius:12px;padding:20px;width:100%;max-width:460px;max-height:92vh;overflow-y:auto;}
.hf-opt{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:0.5px solid #f0f0f0;cursor:pointer;user-select:none;}
.hf-opt:active{opacity:0.7;}
.hf-box{width:28px;height:28px;border-radius:6px;border:2px solid #ccc;background:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.hf-lbl{font-size:15px;line-height:1.4;}
.hf-sec{font-size:14px;font-weight:600;color:#185FA5;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid #e0e0e0;}
.hf-field{margin-bottom:12px;}
.hf-label{display:block;font-size:13px;color:#666;margin-bottom:5px;}
.crew-tile{display:flex;align-items:center;gap:6px;padding:6px 10px;background:#f0faf5;border-radius:7px;border:0.5px solid #97C459;}
</style>
</head>

function sbPost(t,b){return safe(function(){return sbFetch(t,{method:'POST',body:JSON.stringify(b)}).then(function(r){return r.text();}).then(function(t){try{return JSON.parse(t);}catch(e){return null;}});});}
function sbPatch(t,q,b){return safe(function(){return sbFetch(t+'?'+q,{method:'PATCH',body:JSON.stringify(b)}).then(function(){return null;});});}
function sbUpsert(t,b){return safe(function(){return sbFetch(t,{method:'POST',body:JSON.stringify(b),prefer:'resolution=merge-duplicates,return=representation'}).then(function(r){return r.text();}).then(function(t){try{return JSON.parse(t);}catch(e){return null;}});});}
function sbDel(t,q){return safe(function(){return sbFetch(t+'?'+q,{method:'DELETE'}).then(function(){return null;});});}

    o.textContent=u.name+' \u2014 '+u.title;
    sel.appendChild(o);
  });
}

function onNameChange(){
  var name=el('login-name').value;
  var u=USERS.find(function(x){return x.name===name;});
  var hint=el('pin-hint');
  if(hint)hint.textContent=u?'Your PIN: '+u.pin:'';
  var err=el('login-err');
  if(err)err.textContent='';
}

function doLogin(){
  var name=el('login-name').value.trim();
  var pin=el('login-pin').value.trim();
  var errEl=el('login-err');
  if(errEl)errEl.textContent='';
  var u=USERS.find(function(x){return x.name===name&&x.pin===pin;});
  if(!u){
    var expected=(USERS.find(function(x){return x.name===name;})||{}).pin||'unknown';
    if(errEl)errEl.textContent='PIN incorrect. Expected: '+expected;
    return;
  }
  STATE.user=u;
  var today=TODAY();
  var hadMeeting=STATE.morningMeetings.some(function(m){return m.dept===u.dept&&m.date===today;});
  if(!hadMeeting&&(u.role==='lead'||u.role==='manager')){
    renderMorningMeeting();
    showScreen('s-morning');
  } else {
    goToHome();
  }
}

function goToHome(){
  var u=STATE.user;
  if(!u)return showScreen('s-login');
  if(u.role==='crew'){renderCrewHome();showScreen('s-crew');}
  else{renderDashboard();showScreen('s-dashboard');}
}

function doSignOut(){STATE.user=null;showScreen('s-login');}

function goBack(){
  var u=STATE.user;
  if(u&&u.role==='crew'){renderCrewHome();showScreen('s-crew');}
  else{renderDashboard();showScreen('s-dashboard');}
}

function showModal(html){el('modal-content').innerHTML=html;el('modal').style.display='flex';}
function closeModal(){el('modal').style.display='none';el('modal-content').innerHTML='';}

// ── MORNING MEETING ───────────────────────────────────────────────────────────
var _mmChecks={}, _mmAtt={};

function renderMorningMeeting(){
  var u=STATE.user;
  var deptUsers=USERS.filter(function(x){return x.dept===u.dept&&x.id!==u.id;});
  var h='';

  h+='<div class="card-dark" style="margin-bottom:12px;">';

  h+='</div>';

  if(deptUsers.length>0){
    h+='<div class="card"><div style="font-size:15px;font-weight:600;margin-bottom:12px;">Roll call</div>';

      h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid #f0f0f0;gap:8px;flex-wrap:wrap;">';

      h+='<button class="btn btn-sm btn-amber" id="att_'+du.id+'_Late" onclick="setAtt(\''+du.id+'\',\'Late\')">Late</button>';
      h+='<button class="btn btn-sm btn-red" id="att_'+du.id+'_Absent" onclick="setAtt(\''+du.id+'\',\'Absent\')">Absent</button>';
      h+='</div></div>';
    });
    h+='</div>';
  }

  var sections=[
    {title:'Roll call & opening',items:['Dress code check - all team members meet uniform standards','Team needs - early leave requests, payroll issues, concerns','Confirm schedule changes, overtime, or coverage adjustments']},
    {title:'Team updates & blockers',items:['Brief round-robin - updates from each team member','Identify any active blockers or bottlenecks','Review outstanding issues from yesterday','Flag any supplier, equipment, or system issues']},
    {title:'Goals & priorities for the day',items:['Review today\'s workload and deadlines','Assign tasks and responsibilities clearly','Confirm priority order for competing tasks','Confirm resources - equipment and materials are ready']},
    {title:'Morale & wellbeing',items:['Check in on team energy','Recognize wins or strong performance from yesterday','Close with a motivating word or team focus for the day']},
  ];

  sections.forEach(function(sec){
    h+='<div class="card"><div style="font-size:15px;font-weight:600;margin-bottom:10px;">'+sec.title+'</div>';
    sec.items.forEach(function(item,i){
      var key=sec.title.replace(/\W/g,'_')+'_'+i;
      h+='<div style="display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:0.5px solid #f0f0f0;cursor:pointer;" onclick="mmToggle(this,\''+key+'\')">';
      h+='<div class="chk" id="mmchk_'+key+'"></div>';

function setAtt(uid,status){_mmAtt[uid]=status;}

function mmToggle(row,key){

  if(_mmChecks[key]){chk.className='chk chk-done';chk.innerHTML=chkSvg();}

async function completeMM(){
  var notesEl=el('mm-notes');
  var rec={id:uid(),dept:STATE.user.dept,by:STATE.user.name,date:TODAY(),checks:Object.assign({},_mmChecks),attendance:Object.assign({},_mmAtt),notes:notesEl?notesEl.value:'',time:NOW()};

      h+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid #DDD8F8;font-size:13px;"><div style="flex:1;"><span style="font-weight:600;">Hull #'+hn+'</span> \u2014 '+hold.part+'<div style="font-size:11px;color:#999;">'+hold.by+' \u2014 '+hold.time+'</div></div>';

    return cells.indexOf(h.current_cell)!==-1;
  });

  visibleHulls.forEach(function(hull){
    var cell=CELLS.find(function(x){return x.id===hull.current_cell;});
    var days=daysTo(hull.target_date);
    var dColor=days===null?'#666':days<0?'#A32D2D':days<7?'#854F0B':'#3B6D11';
    var dBg=days===null?'#f5f5f5':days<0?'#FCEBEB':days<7?'#FAEEDA':'#EAF3DE';

    if(cell)h+='<span class="badge" style="background:'+cell.bg+';color:'+cell.color+';">'+cell.label+'</span>';
    if(hull.target_date)h+='<span class="badge" style="background:'+dBg+';color:'+dColor+';">'+(days<0?Math.abs(days)+'d overdue':days===0?'Due today':days+'d out')+'</span>';
    if(cos>0)h+='<span class="badge badge-amber">'+cos+' change'+(cos>1?'s':'')+'</span>';
    if(holds>0)h+='<span class="badge badge-purple">'+holds+' hold'+(holds>1?'s':'')+'</span>';
    if(!hull.lam_parts_approved)h+='<span class="badge badge-amber">Lam pending</span>';
    h+='</div></div>';
    h+='<div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">';
    h+='<span style="font-size:22px;color:#ccc;">&#x203A;</span>';

    h+='<button class="btn btn-sm btn-blue" onclick="event.stopPropagation();showAddHullModal(\''+hull.id+'\')">Edit</button>';
    h+='</div></div></div>';
  });

  if(visibleHulls.length===0)h+='<div class="card" style="text-align:center;color:#999;padding:3rem;">No hulls in production.</div>';

  el('dashboard-wrap').innerHTML=h;
}

// ── HULL VIEW ─────────────────────────────────────────────────────────────────
function openHull(hullId){
  var hull=STATE.hulls.find(function(h){return h.id===hullId;});
  if(!hull)return;
  STATE.currentHull=hull;
  STATE.currentCell=hull.current_cell||'lam_gelcoat';
  STATE.hullTab='tasks';
  renderHullView();
  showScreen('s-hull');
}

function setHullTab(tab){STATE.hullTab=tab;renderHullView();}
function setCell(cellId){STATE.currentCell=cellId;renderHullView();}

function renderHullView(){
  var hull=STATE.hulls.find(function(h){return h.id===STATE.currentHull.id;})||STATE.currentHull;
  var u=STATE.user;
  var isAdmin=u.role==='admin';
  var canLead=['admin','manager','lead'].indexOf(u.role)!==-1;
  var canMgr=['admin','manager'].indexOf(u.role)!==-1;

  var h='<button class="btn btn-sm" onclick="goBack()" style="margin-bottom:10px;">\u2190 Back</button>';
  h+='<div style="margin-bottom:12px;">';
  h+='<div style="font-size:20px;font-weight:600;">'+hull.model+' <span style="color:#666;font-weight:400;">Hull #'+hull.serial+'</span></div>';
  h+='<div style="font-size:13px;color:#666;">'+(hull.engines||'Engine TBD')+'</div>';
  if(hull.powder_coat_color)h+='<div style="font-size:13px;margin-top:3px;"><span style="color:#A32D2D;font-weight:500;">Powder coat: </span>'+hull.powder_coat_color+'</div>';
  if(canMgr)h+='<button class="btn btn-sm btn-blue" style="margin-top:8px;" onclick="showAddHullModal(\''+hull.id+'\')">Edit build sheet</button>';
  h+='</div>';

  var tabs=['tasks','buildsheet','lamparts','log','punch','changes'];
  var tabLabels={tasks:'Tasks',buildsheet:'Build Sheet',lamparts:'Lam Parts',log:'Log',punch:'Punch',changes:'Changes'};
  h+='<div class="tab-bar">';
  tabs.forEach(function(t){h+='<button class="tab'+(STATE.hullTab===t?' active':'')+'" onclick="setHullTab(\''+t+'\')">'+tabLabels[t]+'</button>';});
  h+='</div>';

  if(STATE.hullTab==='tasks') h+=renderTasksTab(hull,canLead,canMgr);
  else if(STATE.hullTab==='buildsheet') h+=renderBuildSheetTab(hull);
  else if(STATE.hullTab==='lamparts') h+=renderLamPartsTab(hull,isAdmin);
  else if(STATE.hullTab==='log') h+=renderLogTab(hull);
  else if(STATE.hullTab==='punch') h+=renderPunchTab(hull);
  else if(STATE.hullTab==='changes') h+=renderChangesTab(hull,canMgr);

  el('hull-wrap').innerHTML=h;
}

function renderTasksTab(hull,canLead,canMgr){
  var u=STATE.user;
  var isAdmin=u.role==='admin';
  var depts=u.manages||[u.dept];
  var visibleCells=isAdmin?CELLS:CELLS.filter(function(c){return depts.some(function(d){return (DEPT_CELLS[d]||[]).indexOf(c.id)!==-1;});});

  var h='<div class="tab-bar">';
  visibleCells.forEach(function(cell){
    var ts=STATE.taskStates.find(function(x){return x.hull_id===hull.id&&x.cell_id===cell.id;})||{tasks:{}};
    var tasks=buildTasks(hull,cell.id);
    var done=Object.values(ts.tasks||{}).filter(function(t){return t.status==='done';}).length;
    var pct=tasks.length?Math.round(done/tasks.length*100):0;
    var mgmt=!!ts.mgmt_signoff;
    var isActive=STATE.currentCell===cell.id;
    h+='<button class="tab'+(isActive?' active':'')+'" style="'+(isActive?'background:'+cell.bg+';color:'+cell.color+';border-color:'+cell.color+';':'')+'" onclick="setCell(\''+cell.id+'\')">'+cell.short+(mgmt?' \u2713':pct>0?' '+pct+'%':'')+'</button>';
  });
  h+='</div>';

  var cell=CELLS.find(function(x){return x.id===STATE.currentCell;});
  if(STATE.currentCell==='welding'&&hull.powder_coat_color){
    h+='<div class="welding-color"><div style="font-size:13px;font-weight:600;color:#A32D2D;">Powder coat color for this build</div><div style="font-size:22px;font-weight:700;color:#1a1a1a;margin-top:4px;">'+hull.powder_coat_color+'</div></div>';
  }

  var tasks=buildTasks(hull,STATE.currentCell);
  var tsData=STATE.taskStates.find(function(x){return x.hull_id===hull.id&&x.cell_id===STATE.currentCell;})||{tasks:{}};
  var tmap=tsData.tasks||{};

  h+='<div class="card" style="padding:0;">';
  tasks.forEach(function(task,i){
    var ts2=tmap['r'+i];
    var done=ts2&&ts2.status==='done';
    var isNote=task.indexOf('NOTE:')===0||task.indexOf('POWDER COAT')===0||task.indexOf('UPGRADE:')===0;
    if(isNote){
      var bg=task.indexOf('POWDER COAT')===0?'#FCEBEB':task.indexOf('UPGRADE:')===0?'#FAEEDA':'#FFF8E1';
      var col=task.indexOf('POWDER COAT')===0?'#A32D2D':'#633806';
      h+='<div style="padding:10px 16px;background:'+bg+';font-size:13px;color:'+col+';border-bottom:0.5px solid #f0f0f0;">'+task+'</div>';
      return;
    }
    h+='<div class="task-row'+(done?' task-done':'')+'"'+(canLead?' onclick="toggleTask(\''+hull.id+'\',\''+STATE.currentCell+'\','+i+')"':'')+' style="cursor:'+(canLead?'pointer':'default')+';">';
    h+='<div class="chk'+(done?' chk-done':'')+'">'+(done?chkSvg():'')+'</div>';
    h+='<div style="flex:1;"><div style="font-size:15px;color:'+(done?'#999':'#1a1a1a')+';text-decoration:'+(done?'line-through':'none')+';line-height:1.4;">'+task+'</div>';
    if(done)h+='<div style="font-size:12px;color:#1D9E75;margin-top:2px;">Done by '+ts2.by+' \u2014 '+ts2.time+'</div>';
    h+='</div>';
    if(canLead&&!done)h+='<button class="btn btn-sm btn-red" onclick="event.stopPropagation();flagTask(\''+hull.id+'\',\''+STATE.currentCell+'\','+i+')">Flag</button>';
    h+='</div>';
  });
  h+='</div>';

  if(canLead){
    h+='<div class="card" style="margin-top:8px;">';
    if(!tsData.lead_signoff){
      h+='<button class="btn btn-green btn-full" onclick="leadSignoff(\''+hull.id+'\',\''+STATE.currentCell+'\')">Lead sign-off \u2014 '+(cell?cell.label:STATE.currentCell)+'</button>';
    } else {
      h+='<div style="padding:10px 12px;background:#EAF3DE;border-radius:7px;font-size:14px;color:#3B6D11;">Lead sign-off by '+tsData.lead_signoff.by+' \u2014 '+tsData.lead_signoff.time+'</div>';

// ── ACTIONS ───────────────────────────────────────────────────────────────────
async function toggleTask(hullId,cellId,taskIdx){
  var existing=STATE.taskStates.find(function(x){return x.hull_id===hullId&&x.cell_id===cellId;})||{tasks:{}};
  var tasks=Object.assign({},existing.tasks);
  if(tasks['r'+taskIdx]&&tasks['r'+taskIdx].status==='done'){delete tasks['r'+taskIdx];}
  else{tasks['r'+taskIdx]={status:'done',by:STATE.user.name,time:NOW()};}
  var rec=Object.assign({},existing,{id:existing.id||(hullId+'_'+cellId),hull_id:hullId,cell_id:cellId,tasks:tasks});
  await sbUpsert('task_state',rec);
  var idx=STATE.taskStates.findIndex(function(x){return x.hull_id===hullId&&x.cell_id===cellId;});
  if(idx>=0)STATE.taskStates[idx]=rec; else STATE.taskStates.push(rec);
  renderHullView();
}

async function leadSignoff(hullId,cellId){
  var existing=STATE.taskStates.find(function(x){return x.hull_id===hullId&&x.cell_id===cellId;})||{tasks:{}};
  var rec=Object.assign({},existing,{id:existing.id||(hullId+'_'+cellId),hull_id:hullId,cell_id:cellId,lead_signoff:{by:STATE.user.name,time:NOW()}});
  await sbUpsert('task_state',rec);
  var idx=STATE.taskStates.findIndex(function(x){return x.hull_id===hullId&&x.cell_id===cellId;});
  if(idx>=0)STATE.taskStates[idx]=rec; else STATE.taskStates.push(rec);
  renderHullView();
}

async function mgmtSignoff(hullId,cellId){
  var existing=STATE.taskStates.find(function(x){return x.hull_id===hullId&&x.cell_id===cellId;})||{tasks:{}};
  var rec=Object.assign({},existing,{id:existing.id||(hullId+'_'+cellId),hull_id:hullId,cell_id:cellId,mgmt_signoff:{by:STATE.user.name,time:NOW()}});
  await sbUpsert('task_state',rec);
  var idx=STATE.taskStates.findIndex(function(x){return x.hull_id===hullId&&x.cell_id===cellId;});
  if(idx>=0)STATE.taskStates[idx]=rec; else STATE.taskStates.push(rec);
  renderHullView();
}

function flagTask(hullId,cellId,taskIdx){
  showModal('<div style="font-size:17px;font-weight:600;color:#A32D2D;margin-bottom:12px;">Flag for help</div><textarea class="inp" id="flag-note" rows="3" placeholder="Describe what you need help with..." style="margin-bottom:12px;"></textarea><div style="display:flex;gap:8px;"><button class="btn btn-red" style="flex:1;" onclick="submitFlag(\''+hullId+'\',\''+cellId+'\','+taskIdx+')">Send flag to lead</button><button class="btn" onclick="closeModal()">Cancel</button></div>');
}

async function submitFlag(hullId,cellId,taskIdx){
  var note=(el('flag-note')||{}).value||'Help needed';
  var rec={id:uid(),hull_id:hullId,cell_id:cellId,task_idx:taskIdx,part:'FLAG: '+note,by:STATE.user.name,time:NOW(),resolved:false,flag:true};
  await sbPost('parts_holds',rec);
  STATE.partsHolds.push(rec);
  closeModal();
  renderHullView();
}

async function resolveHold(holdId){
  var updates={resolved:true,resolved_by:STATE.user.name,resolved_at:NOW()};
  await sbPatch('parts_holds','id=eq.'+holdId,updates);
  var idx=STATE.partsHolds.findIndex(function(x){return x.id===holdId;});
  if(idx>=0)Object.assign(STATE.partsHolds[idx],updates);
  if(STATE.user.role==='crew')renderCrewHome(); else renderDashboard();
}

async function approveLamParts(hullId){
  var updates={lam_parts_approved:true,lam_approved_by:STATE.user.name,lam_approved_at:NOW()};
  await sbPatch('hulls','id=eq.'+hullId,updates);
  var idx=STATE.hulls.findIndex(function(h){return h.id===hullId;});
  if(idx>=0)Object.assign(STATE.hulls[idx],updates);
  renderHullView();
}

async function resolveChangeOrder(coId){
  var updates={resolved:true,resolved_by:STATE.user.name};
  await sbPatch('change_orders','id=eq.'+coId,updates);
  var idx=STATE.changeOrders.findIndex(function(x){return x.id===coId;});
  if(idx>=0)Object.assign(STATE.changeOrders[idx],updates);
  renderHullView();
}

async function addLogEntry(hullId){
  var text=(el('log-text')||{}).value||'';
  if(!text.trim())return;
  var rec={id:uid(),hull_id:hullId,text:text.trim(),by:STATE.user.name,time:NOW(),type:'note'};
  await sbPost('build_log',rec);
  STATE.buildLog.push(rec);
  renderHullView();
}

async function addPunchItem(hullId){
  var text=(el('punch-input')||{}).value||'';
  if(!text.trim())return;
  var rec={id:uid(),hull_id:hullId,text:text.trim(),by:STATE.user.name,time:NOW(),done:false};
  await sbPost('punch_lists',rec);
  STATE.punchLists.push(rec);
  renderHullView();
}

async function togglePunch(itemId,hullId){
  var item=STATE.punchLists.find(function(x){return x.id===itemId;});
  if(!item)return;
  var updates={done:!item.done,done_by:STATE.user.name,done_at:NOW()};
  await sbPatch('punch_lists','id=eq.'+itemId,updates);
  Object.assign(item,updates);
  renderHullView();
}

async function addChangeOrder(hullId){
  var text=(el('co-text')||{}).value||'';
  if(!text.trim())return;
  var rec={id:uid(),hull_id:hullId,description:text.trim(),by:STATE.user.name,time:NOW(),resolved:false};
  await sbPost('change_orders',rec);
  STATE.changeOrders.push(rec);
  renderHullView();
}

async function removeHull(hullId,serial){
  if(!confirm('Remove Hull #'+serial+'?'))return;
  await sbDel('hulls','id=eq.'+hullId);
  STATE.hulls=STATE.hulls.filter(function(h){return h.id!==hullId;});
  renderDashboard();
}

function showClockInModal(){

// ── CUSTOM TASK ROUTING ───────────────────────────────────────────────────────
var _ctDepts = {};

function ctToggleDept(row){
  var dept = row.getAttribute('data-dept');
  _ctDepts[dept] = !_ctDepts[dept];
  var box = row.querySelector('.hf-box');
  if(_ctDepts[dept]){
    box.style.borderColor='#1D9E75';box.style.background='#1D9E75';
    box.innerHTML=chkSvg();
    row.style.borderColor='#1D9E75';row.style.background='#E1F5EE';
  } else {
    box.style.borderColor='#ccc';box.style.background='#fff';
    box.innerHTML='';
    row.style.borderColor='#e0e0e0';row.style.background='#fff';
  }
}

function ctAdd(){
  var desc = (el('ct-desc')||{}).value||'';
  if(!desc.trim()){alert('Please enter a task description.');return;}
  var depts = Object.keys(_ctDepts).filter(function(k){return _ctDepts[k];});
  if(depts.length===0){alert('Please select at least one department.');return;}

  if(!_hf.o.customTasks) _hf.o.customTasks = [];
  _hf.o.customTasks.push({desc:desc.trim(), depts:depts});

  // Reset inputs
  if(el('ct-desc')) el('ct-desc').value='';
  _ctDepts={};
  document.querySelectorAll('#ct-depts .hf-opt').forEach(function(row){
    var box=row.querySelector('.hf-box');
    box.style.borderColor='#ccc';box.style.background='#fff';box.innerHTML='';
    row.style.borderColor='#e0e0e0';row.style.background='#fff';
  });

  // Re-render the list
  renderCtList();
}

function renderCtList(){
  var list = el('custom-tasks-list');
  if(!list) return;
  var tasks = _hf.o.customTasks || [];
  if(tasks.length===0){list.innerHTML='';return;}

  var deptLabels={cutgrind:'Cut/Grind',openhull:'Open Hull',welding:'Welding',predeck:'Pre Deck',lamination:'Lamination',pi:'PI/Parts',assembly:'Assembly',subassembly:'Subassembly',upholstery:'Upholstery',final:'Final',detail:'Detail/QC',cnc:'CNC'};

  var h='';
  tasks.forEach(function(task,i){
    h+='<div class="card" style="margin-bottom:6px;padding:12px 14px;background:#EAF3DE;border-color:#97C459;">';
    h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;">';
    h+='<div style="flex:1;"><div style="font-size:14px;font-weight:500;">'+task.desc+'</div>';
    h+='<div style="font-size:12px;color:#3B6D11;margin-top:4px;">'+task.depts.map(function(d){return deptLabels[d]||d;}).join(', ')+'</div></div>';
    h+='<button class="btn btn-sm btn-red" style="margin-left:10px;" onclick="ctRemove('+i+')">Remove</button>';
    h+='</div></div>';
  });
  list.innerHTML=h;
}

function ctRemove(i){
  if(!_hf.o.customTasks) return;
  _hf.o.customTasks.splice(i,1);
  renderCtList();
}

function hfTog(row){
  var key=row.getAttribute('data-key');
  _hf.o[key]=!_hf.o[key];
  var box=row.querySelector('.hf-box');
  if(_hf.o[key]){box.style.borderColor='#1D9E75';box.style.background='#1D9E75';box.innerHTML=chkSvg();}
  else{box.style.borderColor='#ccc';box.style.background='#fff';box.innerHTML='';}
}

function closeHullForm(){renderDashboard();showScreen('s-dashboard');}

async function hfSave(){
  var o=_hf.o;
  var get=function(id){var e=el(id);return e?e.value:'';};
  o.color_notes=get('hf_color_notes');
  o.notes=get('hf_notes');

  var engineMap={engine_std:'Quad Mercury V8 300s',engine_v10_400:'Quad Mercury V10 400s',engine_v10_425:'Quad Mercury V10 425s',engine_v8_500r:'Quad Mercury V8 500 Rs',engine_v10_400r:'Quad V10 400 Rs',engine_yamaha:'Yamaha 350s'};
  var engines='Quad Mercury V8 300s';
  Object.keys(engineMap).forEach(function(k){if(o[k])engines=engineMap[k];});

  function pickColor(keys){return keys.filter(function(x){return o[x.split(':')[0]];}).map(function(x){return x.split(':')[1];}).join(', ');}
  var powder=pickColor(['pc_matt_wht:Matte White','pc_matt_blk:Matte Black','pc_gloss_wht:Gloss White','pc_gloss_blk:Gloss Black','pc_gloss_gray:Gloss Gray','pc_satin_wht:Satin White','pc_custom:Custom'])||(o.color_notes?o.color_notes.split(',')[0].trim():'');
  var hullSide=pickColor(['hs_white:White','hs_whisper_gray:Whisper Gray','hs_haze_gray:Haze Gray','hs_black:Black','hs_fr_blue:FR Blue','hs_ice_blue:Ice Blue','hs_blue_tone_white:Blue Tone White','hs_stars_stripes:Stars/Stripes Blue','hs_custom:Custom']);
  var hullBottom=pickColor(['hb_haze_gray:Haze Gray','hb_whisper_gray:Whisper Gray','hb_black:Black','hb_fr_blue:FR Blue','hb_ice_blue:Ice Blue','hb_blue_tone_white:Blue Tone White','hb_stars_stripes:Stars/Stripes Blue','hb_custom:Custom']);
  var htUnder=pickColor(['ht_haze_gray:Haze Gray','ht_whisper_gray:Whisper Gray','ht_black:Black','ht_fr_blue:FR Blue','ht_ice_blue:Ice Blue','ht_blue_tone_white:Blue Tone White','ht_stars_stripes:Stars/Stripes Blue','ht_custom:Custom']);
  var uphAccent=pickColor(['accent_white:White','accent_auster:Auster','accent_flint:Flint','accent_coconut:Coconut','accent_custom:Custom']);
  var uphThread=pickColor(['thread_white:White','thread_gray:Gray','thread_black:Black','thread_custom:Custom']);

  var isEdit=!!_hf.id&&STATE.hulls.some(function(h){return h.id===_hf.id;});
  var hull={
    id:_hf.id||uid(),
    serial:get('hf_serial')||_hf.serial,
    model:get('hf_model')||_hf.model,
    engines:engines,
    customer_name:get('hf_customer')||_hf.customer_name,
    salesman:get('hf_salesman')||_hf.salesman,
    target_date:get('hf_target_date')||_hf.target_date,
    notes:get('hf_notes')||_hf.notes,
    status:'In Build',
    current_cell:_hf.current_cell||'lam_gelcoat',
    created_at:_hf.created_at||new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
    powder_coat_color:powder,
    hull_side_color:hullSide,
    hull_bottom_color:hullBottom,
    hardtop_underside_color:htUnder,
    uph_accent_color:uphAccent,
    uph_thread_color:uphThread,
    build_options:o,
    lam_parts_approved:_hf.lam_parts_approved||false,
    assigned_crew:_hf.assigned_crew||[],
  };

  if(isEdit){
    await sbPatch('hulls','id=eq.'+hull.id,hull);
    var idx=STATE.hulls.findIndex(function(h){return h.id===hull.id;});
    if(idx>=0)STATE.hulls[idx]=hull;
  } else {
    await sbPost('hulls',hull);
    STATE.hulls.push(hull);
  }
  closeHullForm();
}

// ── LOAD DATA ─────────────────────────────────────────────────────────────────
async function loadData(){
  showScreen('s-loading');
  setTimeout(function(){
    try{initLogin();showScreen('s-login');}catch(e){console.error(e);}
  },2000);
  try{
    var results=await Promise.all([
      sbGet('hulls','select=*&order=created_at.asc'),
      sbGet('task_state','select=*'),
      sbGet('punch_lists','select=*&order=created_at.asc'),
      sbGet('change_orders','select=*&order=created_at.asc'),
      sbGet('build_log','select=*&order=time.asc'),
      sbGet('parts_holds','select=*&order=time.asc'),
      sbGet('morning_meetings','select=*&order=date.desc'),
      sbGet('clocked_in','select=*'),
    ]);
    STATE.hulls=results[0]||[];
    STATE.taskStates=results[1]||[];
    STATE.punchLists=results[2]||[];
    STATE.changeOrders=results[3]||[];
    STATE.buildLog=results[4]||[];
    STATE.partsHolds=results[5]||[];
    STATE.morningMeetings=results[6]||[];
    STATE.clockedIn=results[7]||[];
  }catch(e){console.error('Load error:',e);}
  initLogin();
  showScreen('s-login');
}

loadData();
